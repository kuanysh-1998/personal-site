<div class="about-page">
  <div class="about-page__card-wrapper">
    <ng-card [padding]="'large'" [stylingMode]="'default'" [direction]="'horizontal'">
      <div class="about-page__card-content">
        <ng-avatar
          [src]="'/assets/images/cv.jpeg'"
          [name]="'Kuanysh Aptaizhanov' | transloco"
          [size]="'large'"
          class="about-page__avatar"
        />
        <div class="about-page__content">
          <p class="about-page__name">{{ 'Kuanysh Aptaizhanov' | transloco }}</p>
          <p class="about-page__description">
            {{ 'Frontend engineer in Astana, Kazakhstan' | transloco }}
            <span *ngTooltip="astanaTime()">{{ '(UTC+5)' | transloco }}</span>.
            {{ 'Writing about building Angular apps — from architecture patterns to everyday trade-offs.' | transloco }}
          </p>
        </div>
      </div>
    </ng-card>
  </div>
  <app-latest-posts />
  <app-social-connect />
</div>
