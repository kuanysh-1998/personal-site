<div class="not-found">
  <div class="not-found__code">404</div>
  <h1 class="not-found__title">{{ 'Page not found' | transloco }}</h1>
  <p class="not-found__message">{{ 'The page you are looking for does not exist.' | transloco }}</p>
  <app-button
    [label]="'Go to Blog' | transloco"
    [stylingMode]="'outlined'"
    (clicked)="goToBlog()"
  />

  @if (recentPosts.length > 0) {
    <div class="not-found__suggestions">
      <span class="not-found__suggestions-title">{{ 'Latest Posts' | transloco }}</span>
      <ul class="not-found__list">
        @for (post of recentPosts; track post.slug) {
          <li>
            <app-link
              [link]="'/blog/' + post.slug"
              [text]="post.title | transloco"
              [underlineOnHover]="true"
            />
          </li>
        }
      </ul>
    </div>
  }
</div>
