@if (relatedPosts().length > 0) {
  <div class="related-posts">
    <h3>{{ 'Related Posts' | transloco }}</h3>
    <div class="posts-grid">
      @for (post of relatedPosts(); track post.slug) {
        <app-card
          [padding]="'medium'"
          [stylingMode]="'default'"
          [header]="post.title | transloco"
          [iconRight]="chevronRightIcon"
          [clickable]="true"
          (clicked)="onPostClick(post.slug)"
        >
          @if (post.tags && post.tags.length > 0) {
            <div class="post-tags">
              @for (tag of post.tags; track tag) {
                <app-badge
                  [text]="tag | transloco"
                  [size]="'small'"
                  [stylingMode]="'outlined'"
                  [variant]="'secondary'"
                />
              }
            </div>
          }
          @if (post.description) {
            <div class="post-description">{{ post.description | transloco }}</div>
          }
        </app-card>
      }
    </div>
  </div>
}
