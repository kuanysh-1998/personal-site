@if (previousPost || nextPost) {
<nav class="post-navigation">
  @if (previousPost) {
  <ng-list-item
    [link]="'/blog/' + previousPost.slug"
    [icon]="'chevron-left'"
    [headerText]="'Previous' | transloco"
    [text]="previousPost.title | transloco"
    [enableWrapTwoRows]="true"
  />
  } @else {
  <div class="nav-link--empty"></div>
  } @if (nextPost) {
  <ng-list-item
    [link]="'/blog/' + nextPost.slug"
    [rightIcon]="'chevron-right'"
    [headerText]="'Next' | transloco"
    [text]="nextPost.title | transloco"
    [enableWrapTwoRows]="true"
  />
  } @else {
  <div class="nav-link--empty"></div>
  }
</nav>
}
