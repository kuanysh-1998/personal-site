<div class="pagination">
  <app-button
    [stylingMode]="'outlined'"
    [size]="'default'"
    [icon]="chevronLeftIcon"
    [disabled]="!hasPrevious()"
    [ariaLabel]="'Previous page'"
    (clicked)="previousPage()"
  />

  @if (showFirstPage()) {
    <app-button
      [stylingMode]="'outlined'"
      [size]="'default'"
      [label]="'1'"
      (clicked)="goToPage(1)"
    />
    <span class="pagination__ellipsis">...</span>
  }

  @for (page of visiblePages(); track page) {
    <app-button
      [stylingMode]="isCurrentPage(page) ? 'contained' : 'outlined'"
      [size]="'default'"
      [label]="page.toString()"
      [active]="isCurrentPage(page)"
      [disabled]="isCurrentPage(page)"
      (clicked)="goToPage(page)"
    />
  }

  @if (showLastPage()) {
    <span class="pagination__ellipsis">...</span>
    <app-button
      [stylingMode]="'outlined'"
      [size]="'default'"
      [label]="totalPages().toString()"
      (clicked)="goToPage(totalPages())"
    />
  }

  <app-button
    [stylingMode]="'outlined'"
    [size]="'default'"
    [icon]="chevronRightIcon"
    [disabled]="!hasNext()"
    [ariaLabel]="'Next page'"
    (clicked)="nextPage()"
  />
</div>
