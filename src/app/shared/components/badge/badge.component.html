<div class="ng-badge">
  @if (url) {
    <a
      #badgeWrapper
      [ngClass]="badgeClasses"
      [href]="url"
      [target]="'_blank'"
      [rel]="'noopener noreferrer'"
      class="ng-badge__link"
    >
      @if (icon) {
        <app-svg
          [icon]="icon"
          [class.ng-badge__icon_clickable]="iconClickable"
          (click)="clickIcon()"
          size="small"
          class="ng-badge__icon"
        ></app-svg>
      }

      <span [attr.data-token]="token" class="ng-badge__text">
        <span #badgeText>{{ text }}</span>
      </span>

      @if (iconRight) {
        <app-svg
          [icon]="iconRight"
          [class.ng-badge__icon_clickable]="iconRightClickable"
          (click)="clickIconRight()"
          size="small"
          class="ng-badge__icon"
        ></app-svg>
      }
    </a>
  } @else {
    <div #badgeWrapper [ngClass]="badgeClasses">
      @if (icon) {
        <app-svg
          [icon]="icon"
          [class.ng-badge__icon_clickable]="iconClickable"
          (click)="clickIcon()"
          size="small"
          class="ng-badge__icon"
        ></app-svg>
      }

      <span [attr.data-token]="token" class="ng-badge__text">
        <span #badgeText>{{ text }}</span>
      </span>

      @if (iconRight) {
        <app-svg
          [icon]="iconRight"
          [class.ng-badge__icon_clickable]="iconRightClickable"
          (click)="clickIconRight()"
          size="small"
          class="ng-badge__icon"
        ></app-svg>
      }
    </div>
  }

  @if (isOverflowing() && badgeWrapper) {
    <app-tooltip
      [for]="badgeWrapper.nativeElement"
      [content]="text"
      [position]="tooltipPosition"
    ></app-tooltip>
  }
</div>
